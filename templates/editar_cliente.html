<!DOCTYPE html>
<html>
<head>
    <title>Editar Cliente • ST Gestión</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">

    <style>
        body{
            background:#f4f6f9;
        }

        .card{
            max-width:650px;
            margin:40px auto;
            background:white;
            padding:25px;
            border-radius:12px;
            box-shadow:0 8px 25px rgba(0,0,0,0.08);
        }

        .card h2{
            text-align:center;
            margin-bottom:20px;
        }

        .field{
            margin-bottom:12px;
        }

        .field label{
            display:block;
            font-size:13px;
            margin-bottom:5px;
            color:#555;
            font-weight:bold;
        }

        .field input{
            width:100%;
            padding:10px;
            border:1px solid #ddd;
            border-radius:8px;
            outline:none;
        }

        .field input:focus{
            border-color:#007bff;
        }

        .readonly{
            background:#f1f1f1;
            color:#555;
        }

        .btn{
            width:100%;
            padding:12px;
            border:none;
            border-radius:8px;
            font-weight:bold;
            cursor:pointer;
        }

        .btn-save{
            background:#28a745;
            color:white;
            margin-top:10px;
        }

        .btn-back{
            background:#007bff;
            color:white;
            margin-top:10px;
        }

        .hint{
            font-size:12px;
            color:#888;
            margin-top:3px;
        }
    </style>
</head>

<body>

<div class="card">

    <h2>✏️ Editar Cliente</h2>

    <form method="POST" action="/actualizar_cliente/{{ cliente.id }}">

        <!-- 👤 NOMBRE -->
        <div class="field">
            <label>👤 Nombre del cliente</label>
            <input type="text"
                   name="nombre"
                   value="{{ cliente.nombre }}"
                   placeholder="Ej: Juan Pérez"
                   required>
            <div class="hint">Nombre completo o razón social del cliente</div>
        </div>

        <!-- 📍 DIRECCIÓN -->
        <div class="field">
            <label>📍 Dirección</label>
            <input type="text"
                   name="direccion"
                   value="{{ cliente.direccion }}"
                   placeholder="Ej: Calle 10 # 23-45">
            <div class="hint">Dirección de residencia o negocio</div>
        </div>

        <!-- 🏙 CIUDAD -->
        <div class="field">
            <label>🏙 Ciudad</label>
            <input type="text"
                   name="ciudad"
                   value="{{ cliente.ciudad }}"
                   placeholder="Ej: Cali">
            <div class="hint">Ciudad donde se encuentra el cliente</div>
        </div>

        <!-- 📞 TELÉFONO -->
        <div class="field">
            <label>📞 Teléfono</label>
            <input type="text"
                   name="telefono"
                   value="{{ cliente.telefono }}"
                   placeholder="Ej: 3001234567">
            <div class="hint">Número de contacto principal</div>
        </div>

        <!-- 🪪 IDENTIFICACIÓN (BLOQUEADO) -->
        <div class="field">
            <label>🪪 Identificación (no editable)</label>
            <input type="text"
                   value="{{ cliente.identificacion }}"
                   readonly
                   class="readonly">
            <div class="hint">Este dato no se puede modificar por seguridad del sistema</div>
        </div>

        <!-- BOTONES -->
        <button type="submit" class="btn btn-save">
            💾 Guardar cambios
        </button>

        <a href="/clientes">
            <button type="button" class="btn btn-back">
                ⬅ Volver a clientes
            </button>
        </a>

    </form>

</div>

</body>
</html>
